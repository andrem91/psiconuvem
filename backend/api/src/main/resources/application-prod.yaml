spring:
  datasource:
    # Em prod, NUNCA defina valores default. Se a variável faltar, o app DEVE falhar.
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASS}

  jpa:
    show-sql: false # Performance: não logar SQL em prod
    properties:
      hibernate:
        ddl-auto: validate

# Configuração AWS Real
aws:
  endpoint: "" # Vazio = SDK usa a URL real da AWS
  region: sa-east-1 # São Paulo
  # Credentials não são definidas aqui; o SDK pega automaticamente da Role da máquina (IAM)

logging:
  level:
    br.com.psiconuvem: INFO
    org.springframework: WARN